{{- if .Values.dataservice.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "airsgateway.fullname" . }}-{{ .Values.dataservice.name }}
  labels:
    {{- include "dataservice.labels" . | nindent 4 }}
    {{- with .Values.dataservice.deployment.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- if .Values.dataservice.deployment.autoRestart }}
      rollme: {{ randAlphaNum 5 | quote }}
    {{- end }}
    {{- include "airsgateway.annotations" . | nindent 6 }}
    {{- with .Values.dataservice.deployment.annotations }}
      {{- toYaml . | nindent 6 }}
    {{- end }}
spec:
  {{- if not (kindIs "invalid" .Values.dataservice.deployment.revisionHistoryLimit) }}
  revisionHistoryLimit: {{ .Values.dataservice.deployment.revisionHistoryLimit }}
  {{- end }}
  {{- if not .Values.dataservice.autoscaling.enabled }}
  replicas: {{ .Values.dataservice.deployment.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "dataservice.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
      {{- if .Values.dataservice.deployment.autoRestart }}
        rollme: {{ randAlphaNum 5 | quote }}
      {{- end }}
        checksum/config: {{ include (print $.Template.BasePath "/gateway/config.yaml") . | sha256sum }}
      {{- if .Values.useVaultInjection }}
        {{- include "airsgateway.vaultAnnotations" . | nindent 8 }}
      {{- end }}
      {{- with .Values.dataservice.deployment.annotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "dataservice.labels" . | nindent 8 }}
        {{- with .Values.dataservice.deployment.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if hasKey .Values.dataservice.deployment "terminationGracePeriodSeconds" }}
      terminationGracePeriodSeconds: {{ .Values.dataservice.deployment.terminationGracePeriodSeconds }}
      {{- end }}
      {{- include "airsgateway.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.dataservice.deployment.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "dataservice.serviceAccountName" . }}
      containers:
        - name: {{ .Values.dataservice.name }}
          {{- with .Values.dataservice.deployment.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.dataservice.envFrom }}
          envFrom:
            {{- toYaml .Values.dataservice.envFrom | nindent 12 }}
          {{- end }}
          env:
            - name: GATEWAY_BASE_URL
              value: http://{{ include "airsgateway.fullname" . }}:{{ .Values.service.port }}
            {{- include "dataservice.commonEnv" . | nindent 12 }}
            {{- include "airsgateway.builtinDefaults" . | nindent 12 }}
            {{- include "managementPlane.commonEnv" . | nindent 12 }}
            {{- include "cacheStore.commonEnv" . | nindent 12 }}
            {{- include "logStore.commonEnv" . | nindent 12 }}
            {{- with .Values.dataservice.deployment.extraEnv }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          image: "{{ .Values.images.dataserviceImage.repository }}:{{ .Values.images.dataserviceImage.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.images.dataserviceImage.pullPolicy }}
          ports:
            - name: dataservice
              containerPort: {{ .Values.dataservice.containerPort }}
              protocol: TCP
          {{- with .Values.dataservice.deployment.startupProbe }}
          startupProbe:
            {{- $p := deepCopy . }}
            {{- if and $p.httpGet (not $p.httpGet.port) }}
            {{- $_ := set $p.httpGet "port" ($.Values.dataservice.containerPort | int) }}
            {{- end }}
            {{- toYaml $p | nindent 12 }}
          {{- end }}
          {{- with .Values.dataservice.deployment.livenessProbe }}
          livenessProbe:
            {{- $p := deepCopy . }}
            {{- if and $p.httpGet (not $p.httpGet.port) }}
            {{- $_ := set $p.httpGet "port" ($.Values.dataservice.containerPort | int) }}
            {{- end }}
            {{- toYaml $p | nindent 12 }}
          {{- end }}
          {{- with .Values.dataservice.deployment.readinessProbe }}
          readinessProbe:
            {{- $p := deepCopy . }}
            {{- if and $p.httpGet (not $p.httpGet.port) }}
            {{- $_ := set $p.httpGet "port" ($.Values.dataservice.containerPort | int) }}
            {{- end }}
            {{- toYaml $p | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.dataservice.deployment.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.dataservice.deployment.securityContext | nindent 12 }}
          volumeMounts:
            {{- if .Values.dataservice.deployment.securityContext.readOnlyRootFilesystem }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
            {{- with .Values.dataservice.deployment.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.dataservice.deployment.extraContainerConfig }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.dataservice.deployment.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.dataservice.deployment.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dataservice.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dataservice.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dataservice.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if .Values.dataservice.deployment.securityContext.readOnlyRootFilesystem }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        {{- with .Values.dataservice.deployment.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.dataservice.deployment.hostAlias }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dataservice.deployment.dnsPolicy }}
      {{- if and (eq .Values.dataservice.deployment.dnsPolicy "None") (empty .Values.dataservice.deployment.dnsConfig.nameservers) }}
        {{- fail "dataservice: dnsPolicy \"None\" requires at least one entry in dataservice.deployment.dnsConfig.nameservers" }}
      {{- end }}
      dnsPolicy: {{ .Values.dataservice.deployment.dnsPolicy }}
      {{- end }}
      {{- with .Values.dataservice.deployment.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}