{{- if eq (include "redis.deploy" .) "true" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.redis.name | default "redis" }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    {{- with .Values.redis.statefulSet.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with .Values.redis.statefulSet.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not (kindIs "invalid" .Values.redis.statefulSet.revisionHistoryLimit) }}
  revisionHistoryLimit: {{ .Values.redis.statefulSet.revisionHistoryLimit }}
  {{- end }}
  serviceName: {{ .Values.redis.name | default "redis" }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis.labels" . | nindent 8 }}
        {{- with .Values.redis.statefulSet.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.redis.statefulSet.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.redis.statefulSet.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.statefulSet.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.statefulSet.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.statefulSet.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "airsgateway.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: redis
          image: "{{ .Values.images.redisImage.repository }}:{{ .Values.images.redisImage.tag }}"
          imagePullPolicy: {{ .Values.images.redisImage.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.port | default 6379 }}
              protocol: TCP
          {{- if .Values.redis.auth.enabled }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ .Values.redis.auth.existingSecretPasswordKey }}
          {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              extra_args=""
              if [ -n "${REDIS_PASSWORD:-}" ]; then
                extra_args="--requirepass ${REDIS_PASSWORD}"
              fi
              exec redis-server /etc/redis/redis.conf ${extra_args}
          {{- if and .Values.redis.statefulSet.livenessProbe .Values.redis.statefulSet.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  {{- if .Values.redis.auth.enabled }}
                  redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
                  {{- else }}
                  redis-cli ping | grep PONG
                  {{- end }}
            initialDelaySeconds: {{ .Values.redis.statefulSet.livenessProbe.initialDelaySeconds | default 20 }}
            periodSeconds: {{ .Values.redis.statefulSet.livenessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.redis.statefulSet.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.redis.statefulSet.livenessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- if and .Values.redis.statefulSet.readinessProbe .Values.redis.statefulSet.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  {{- if .Values.redis.auth.enabled }}
                  redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
                  {{- else }}
                  redis-cli ping | grep PONG
                  {{- end }}
            initialDelaySeconds: {{ .Values.redis.statefulSet.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.redis.statefulSet.readinessProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.redis.statefulSet.readinessProbe.timeoutSeconds | default 3 }}
            failureThreshold: {{ .Values.redis.statefulSet.readinessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- with .Values.redis.statefulSet.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/redis
              readOnly: true
            {{- if .Values.redis.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
          resources:
            {{- toYaml .Values.redis.statefulSet.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ printf "%s-redis-config" (include "airsgateway.fullname" .) }}
            defaultMode: 0444
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "redis.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.redis.persistence.accessMode | default "ReadWriteOnce" }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size | default "1Gi" }}
        {{- if .Values.redis.persistence.storageClassName }}
        storageClassName: {{ .Values.redis.persistence.storageClassName }}
        {{- end }}
  {{- end }}
{{- end }}
